name: Docker Publish

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - ".dockerignore"
      - ".github/workflows/docker-publish.yml"
      - "Dockerfile"
      - "README.md"
      - "docker/**"
      - "docs/**"
      - "pyproject.toml"
      - "src/**"

jobs:
  docker-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free runner disk space
        run: |
          df -h
          timeout 120s sudo rm -rf /usr/share/dotnet || true
          timeout 120s sudo rm -rf /usr/local/lib/android || true
          timeout 120s sudo rm -rf /opt/ghc || true
          timeout 120s sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          timeout 120s docker system prune -af || true
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/kleva
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=ref,event=tag

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
